<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wayne</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f0f0f;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #222;
      border-radius: 16px;
      background: rgba(20, 20, 20, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(255, 255, 255, 0.03);
    }

    .wave {
      font-size: 3rem;
      display: inline-block;
      animation: wave 2s ease-in-out infinite;
      transform-origin: 70% 70%;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(20deg); }
      75%       { transform: rotate(-10deg); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-top: 0.75rem;
      color: #ffffff;
    }

    p {
      margin-top: 0.75rem;
      font-size: 1rem;
      font-weight: 300;
      color: #666;
      letter-spacing: 0.3px;
    }

    .badge {
      display: inline-block;
      margin-top: 1.75rem;
      padding: 0.35rem 0.9rem;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="card">
    <span class="wave">👋</span>
    <h1>Hello! I am Wayne</h1>
    <p>My first project with cbcode!</p>
    <span class="badge">Just getting started</span>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    const chars = ['~', '≈', '-', '~', '≋', '∿', '=', '~', '-', '≈'];
    const fontSize = 15;
    let cols, rows, t = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.ceil(canvas.width / (fontSize * 0.65));
      rows = Math.ceil(canvas.height / fontSize);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = `${fontSize}px monospace`;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          // Layered sine waves to mimic water flow
          const wave =
            Math.sin(c * 0.25 + t * 1.2) * 0.4 +
            Math.sin(c * 0.1 - r * 0.15 + t * 0.8) * 0.35 +
            Math.sin(r * 0.2 + t * 0.5) * 0.25;

          const normalized = (wave + 1) / 2; // 0–1
          const charIndex = Math.floor(normalized * chars.length) % chars.length;
          const opacity = normalized * 0.18 + 0.02;

          ctx.fillStyle = `rgba(100, 180, 255, ${opacity})`;
          ctx.fillText(chars[charIndex], c * fontSize * 0.65, r * fontSize);
        }
      }

      t += 0.025;
      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
  </script>
</body>
</html>
